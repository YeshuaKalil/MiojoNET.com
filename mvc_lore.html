        <div id="game">

            <div class="lore left"><img src="imagens/loreintro.svg"><div class="title">Sobre o Jogo</div>
            <div class="text">
                <label class="loret">'Miojo vs Cup Noodles' introduz a história de um ex-general do Reino dos Miojos que, em uma tentativa de recuperar o poder de sua nação, invade a base dos Cup Noodles ao julgar serem eles os responsáveis pela destruição da Panela Suprema, e consequentemente, pela queda dos Nissin Lámen.</label>
            </div></div>
            
            <div class="lore right"><img src="imagens/general.png"><div class="title">General Meus Olhos</div>
            
            <div class="text">
                <label class="loret">Um bravo combatente. Patriota para fazer de tudo pela nação, rebelde para abandonar seu escudo. Virou desertor durante a guerra contra os Cup Noodles. Nunca revelou o motivo, e ninguém teve coragem de espalhar algum boato sequer. Buscou sempre a glória de sua raça, e exterminou as pragas mais agressivas. Nunca se conformou com a proximidade que os Cup Noodles tinham da fronteira. Sua promessa foi de exterminar essa praga também.</label>
            </div></div>

            <div class="lore left"><img src="imagens/bolonhesa.png"><div class="title">Cup Noodles</div>
            <div class="text">
                <label class="loret">Seres violentos e asquerosos. Seu único propósito é a guerra, e por isso, sua raça se encontra em miséria, em um confronto de animais por ambições egoístas e primitivas. Desde o ocorrido no templo, sua tribo avançava mais a cada dia sobre o território Nissin. As tropas dos miojos intensificaram a defesa nas fronteiras, mas não foi o suficiente para conter a invasão. Até o momento, o Reino Nissin é vítima de seu controle.</label>
                
            </div></div>

            <div class="lore right"><img src="imagens/panela.svg"><div class="title">A Panela Suprema</div>
            <div class="text">
                
                <label class="loret">O núcleo do Reino Nissin. Durante muito tempo, foi a fonte do poder dos miojos. Sua energia não tem uma origem explicável, mas se inventaram muitas histórias sobre ela, algumas consideradas verdades por grande parte dos moradores do Reino.</label>
            </div></div>
        </div>
