<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mvc_main.css">
    <title>Login e Inscrição - Miojo VS Cup Noodles</title>
</head>
<body>
    <div id="header">
        <div id="logo">
            <a href="mvc_home.html">
              <img id="logoimg" src="imagens/logo_provisoria.jpeg" alt="Logo Miojo VS Cup Noodles">
            </a>
        </div>
        <div id="nav">
            <ul>
                <li><a href="mvc_home.html">Início</a></li>
                <li><a href="mvc_game.html">Miojo vs Cup Noodles</a></li>
                <li><a href="mvc_lore.html">História</a></li>
                <li><a href="mvc_record.html">Recordações</a></li>
                <li><a href="mvc_about.html">Sobre nós</a></li>
                <li><a href="mvc_profile.html">Perfil</a></li>
            </ul>
        </div>
    </div>

    <div id="section">
        <div id="about">
            <div class="title">Login</div>
            <form id="loginP" action="#" method="post">
                <div><label for="login_username">Nome de Usuário:</label>
                <input type="text" id="login_username" name="login_username" required></div>
                <br>
                <div><label for="login_password">Senha:</label>
                <input type="password" id="login_password" name="login_password" required></div>
                <br><br>
                <button type="submit">Entrar</button>
            </form>
        </div>
        <div id="game">
            <div class="title">Inscrição</div>
            <form id="inscricaoP" action="#" method="post">
                <div><label for="signup_username">Nome de Usuário:</label>
                <input type="text" id="signup_username" name="signup_username" required></div>
                <br>
                <div><label for="signup_email">Email:</label>
                <input type="email" id="signup_email" name="signup_email" required></div>
                <br>
                <div><label for="signup_password">Senha:</label>
                <input type="password" id="signup_password" name="signup_password" required></div>
                <br>
                <div><label for="signup_confirm_password">Confirmar Senha:</label>
                <input type="password" id="signup_confirm_password" name="signup_confirm_password" required></div>
                <br><br>
                <button type="submit">Registrar</button>
            </form>
        </div>
    </div>

    <div id="footer">
      <p>Não filiado a marca Nissin</p>
      <p>Site desenvolvido por Ricardo Yeshua Cavalcante Kalil e Lucas de Carvalho Araújo Domingos</p>
    </div>
</body>
</html>
